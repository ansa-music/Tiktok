<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ANSA_RUN_3D // V6_ULTIMATE</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@300;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #ff2d55;
            --blue: #007aff;
            --bg: #000000;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            user-select: none;
        }

        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'JetBrains Mono', monospace; 
            overflow: hidden; 
            touch-action: none;
        }

        /* --- UI OVERLAY ARCHITECTURE --- */
        .hud-system {
            position: fixed; top: 0; left: 0; width: 100%;
            padding: calc(50px + env(safe-area-inset-top)) 30px;
            display: flex; justify-content: space-between;
            z-index: 100; pointer-events: none;
        }

        .data-panel { border-left: 3px solid var(--accent); padding-left: 15px; }
        .score-val { font-family: 'Orbitron', sans-serif; font-size: 30px; color: var(--accent); text-shadow: 0 0 20px var(--accent); }
        .tech-label { font-size: 8px; letter-spacing: 5px; color: #555; text-transform: uppercase; margin-bottom: 5px; }

        /* --- SCREENS & MODALS --- */
        .ui-screen {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 1000; text-align: center;
            backdrop-filter: blur(30px); transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .cabinet-wrap {
            width: 90%; max-width: 420px; padding: 40px;
            background: var(--glass); border: 1px solid var(--border);
            border-radius: 40px; margin-bottom: 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }

        .btn-neural {
            background: none; border: 1px solid var(--accent);
            color: var(--accent); padding: 20px 70px;
            font-family: 'Orbitron'; font-size: 0.7rem; letter-spacing: 7px;
            text-transform: uppercase; cursor: pointer; border-radius: 15px;
            transition: 0.3s;
        }
        .btn-neural:active { background: var(--accent); color: #fff; transform: scale(0.95); }

        /* --- CONTROLS --- */
        .control-layer {
            position: fixed; bottom: calc(50px + env(safe-area-inset-bottom));
            left: 50%; transform: translateX(-50%); z-index: 500;
        }

        .skate-trigger {
            width: 100px; height: 100px; background: var(--glass);
            border: 2px solid var(--border); border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            backdrop-filter: blur(20px); transition: 0.4s;
        }
        .skate-trigger.active { 
            border-color: var(--accent); 
            background: rgba(255, 45, 85, 0.2);
            box-shadow: 0 0 50px var(--accent);
            transform: scale(1.1) translateY(-10px);
        }

        #timer-box { position: absolute; top: -35px; font-weight: 900; color: var(--accent); font-family: 'Orbitron'; font-size: 14px; }
    </style>
</head>
<body>

    <div class="hud-system">
        <div class="data-panel">
            <div class="tech-label">SYNC_DISTANCE</div>
            <div id="scoreTxt" class="score-val">000000</div>
        </div>
        <div style="text-align: right;">
            <div class="tech-label">PROTOCOL_STATUS</div>
            <div id="statusTxt" style="font-size: 11px; color: var(--blue); font-weight: 900;">STABLE_V6</div>
        </div>
    </div>

    <div id="menuScreen" class="ui-screen">
        <div class="cabinet-wrap">
            <h1 style="font-family:'Orbitron'; font-size: 2.2rem; margin-bottom: 10px;">ANSA<span style="color:var(--accent)">_</span>RUN</h1>
            <p style="font-size: 9px; letter-spacing: 8px; color: #444; margin-bottom: 40px;">ALMATY_ENGINE_V.6.0</p>
            
            <div style="text-align: left; font-size: 11px; border-top: 1px solid var(--border); padding-top: 25px;">
                <div style="display:flex; justify-content:space-between; margin-bottom:12px;">
                    <span>HIGH_RECORD:</span> <span id="bestScore" style="color:var(--accent)">0</span>
                </div>
                <div style="display:flex; justify-content:space-between; margin-bottom:12px;">
                    <span>TOTAL_TRIP:</span> <span id="totalDist">0</span>
                </div>
                <div style="display:flex; justify-content:space-between;">
                    <span>SESSIONS:</span> <span id="sessionNum">0</span>
                </div>
            </div>
        </div>
        <button class="btn-neural" onclick="System.init()">Initialize</button>
    </div>

    <div id="deathScreen" class="ui-screen" style="display: none;">
        <h2 style="font-family:'Orbitron'; color:var(--accent); font-size: 2.5rem;">FATAL_ERROR</h2>
        <div style="margin: 50px 0;">
            <div id="finalScore" class="score-val" style="font-size: 4.5rem;">0</div>
        </div>
        <button class="btn-neural" onclick="location.reload()">Reboot Protocol</button>
    </div>

    <div class="control-layer">
        <div id="skateBtn" class="skate-trigger">
            <div id="timer-box"></div>
            <span style="font-size: 36px;">🛹</span>
        </div>
    </div>

    <script>
        /**
         * =====================================================================
         * MODULE 01: GLOBAL ENGINE CONFIGURATION
         * =====================================================================
         */
        const CONFIG = {
            ACCENT: 0xff2d55,
            BLUE: 0x007aff,
            LANE_WIDTH: 3.0,
            BASE_SPEED: 0.45,
            SMOOTH_FACTOR: 0.15,
            MAX_LANES: 6
        };

        /**
         * =====================================================================
         * MODULE 02: CABINET DATA PERSISTENCE
         * =====================================================================
         */
        const Cabinet = {
            load() {
                document.getElementById('bestScore').innerText = localStorage.getItem('ansa_v6_best') || 0;
                document.getElementById('totalDist').innerText = localStorage.getItem('ansa_v6_total') || 0;
                document.getElementById('sessionNum').innerText = localStorage.getItem('ansa_v6_sessions') || 0;
            },
            save(score) {
                let best = parseInt(localStorage.getItem('ansa_v6_best') || 0);
                let total = parseInt(localStorage.getItem('ansa_v6_total') || 0);
                let sessions = parseInt(localStorage.getItem('ansa_v6_sessions') || 0);

                if (score > best) localStorage.setItem('ansa_v6_best', Math.floor(score));
                localStorage.setItem('ansa_v6_total', total + Math.floor(score));
                localStorage.setItem('ansa_v6_sessions', sessions + 1);
            }
        };

        /**
         * =====================================================================
         * MODULE 03: CORE SYSTEM (Three.js Implementation)
         * =====================================================================
         */
        const System = {
            scene: null, camera: null, renderer: null,
            player: null, laneDividers: [],
            obstacles: [], buildings: [],
            
            isRunning: false,
            score: 0,
            speed: CONFIG.BASE_SPEED,
            laneCount: 3,
            targetLane: 1,
            
            isSkating: false,
            isCrashed: false,
            crashCount: 0,
            cooldownEnd: 0,

            init() {
                document.getElementById('menuScreen').style.display = 'none';
                this.setupGraphics();
                this.setupWorld();
                this.setupControls();
                this.isRunning = true;
                this.animate();
            },

            setupGraphics() {
                this.scene = new THREE.Scene();
                this.scene.fog = new THREE.Fog(0x000000, 20, 50);
                
                this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                document.body.appendChild(this.renderer.domElement);

                // Lighting
                const pLight = new THREE.PointLight(CONFIG.ACCENT, 5, 70);
                pLight.position.set(0, 15, 10);
                this.scene.add(pLight);
                this.scene.add(new THREE.AmbientLight(0x333333));
            },

            setupWorld() {
                // Дорога (Grid Floor)
                const grid = new THREE.GridHelper(200, 100, CONFIG.ACCENT, 0x111111);
                grid.position.y = 0.01;
                this.scene.add(grid);

                this.updateLaneDividers();
                this.createPlayer();
                
                for(let i=0; i<50; i++) this.spawnBuilding(i * 12 - 120);

                this.camera.position.set(0, 4.5, 13);
                this.camera.lookAt(0, 1, 0);
            },

            /**
             * ФИКС БАГА ПОЛОС: Динамическое разделение
             */
            updateLaneDividers() {
                // Удаляем старые линии
                this.laneDividers.forEach(line => this.scene.remove(line));
                this.laneDividers = [];

                // Создаем новые лазерные линии
                const lineGeo = new THREE.PlaneGeometry(0.05, 100);
                const lineMat = new THREE.MeshBasicMaterial({ color: CONFIG.BLUE, transparent: true, opacity: 0.5 });

                for(let i = 1; i < this.laneCount; i++) {
                    const line = new THREE.Mesh(lineGeo, lineMat);
                    line.rotation.x = -Math.PI / 2;
                    // Рассчитываем позицию линии между дорожками
                    const xPos = (i - this.laneCount / 2) * CONFIG.LANE_WIDTH;
                    line.position.set(xPos, 0.05, 0);
                    this.scene.add(line);
                    this.laneDividers.push(line);
                }
            },

            createPlayer() {
                const group = new THREE.Group();
                
                // Детализированный истребитель (Interceptor V6)
                const bodyGeo = new THREE.ConeGeometry(0.4, 1.2, 4);
                const bodyMat = new THREE.MeshPhongMaterial({ color: 0xffffff, wireframe: true });
                const body = new THREE.Mesh(bodyGeo, bodyMat);
                body.rotation.x = Math.PI / 2;
                group.add(body);

                // Крылья
                const wingGeo = new THREE.BoxGeometry(1.5, 0.05, 0.6);
                const wingMat = new THREE.MeshBasicMaterial({ color: CONFIG.BLUE });
                const wings = new THREE.Mesh(wingGeo, wingMat);
                wings.position.set(0, -0.1, 0.2);
                group.add(wings);

                this.player = group;
                this.player.position.set(0, 0.8, 6);
                this.scene.add(this.player);
            },

            spawnBuilding(z) {
                const h = 10 + Math.random() * 30;
                const building = new THREE.Mesh(
                    new THREE.BoxGeometry(5, h, 5),
                    new THREE.MeshPhongMaterial({ color: 0x080808, wireframe: Math.random() > 0.3 })
                );
                building.position.set(Math.random() > 0.5 ? 20 : -20, h/2, z);
                this.scene.add(building);
                this.buildings.push(building);
            },

            setupControls() {
                // ПРЕЦИЗИОННОЕ УПРАВЛЕНИЕ: Разделение экрана
                window.addEventListener('touchstart', (e) => {
                    if (!this.isRunning) return;
                    const touchX = e.touches[0].clientX;
                    const sectorWidth = window.innerWidth / this.laneCount;
                    // Индекс дорожки рассчитывается математически точно
                    this.targetLane = Math.floor(touchX / sectorWidth);
                });

                document.getElementById('skateBtn').addEventListener('touchstart', (e) => {
                    e.stopPropagation();
                    if (this.isCrashed) return;
                    this.isSkating = !this.isSkating;
                    document.getElementById('skateBtn').classList.toggle('active', this.isSkating);
                });
            },

            spawnObstacle() {
                const lane = Math.floor(Math.random() * this.laneCount);
                const cube = new THREE.Mesh(
                    new THREE.BoxGeometry(1.2, 1.2, 1.2),
                    new THREE.MeshPhongMaterial({ color: CONFIG.ACCENT, emissive: CONFIG.ACCENT, emissiveIntensity: 0.8 })
                );
                // Точное позиционирование куба по центру дорожки
                const xPos = (lane - (this.laneCount - 1) / 2) * CONFIG.LANE_WIDTH;
                cube.position.set(xPos, 0.6, -60);
                this.scene.add(cube);
                this.obstacles.push(cube);
            },

            animate() {
                if (!this.isRunning) return;
                requestAnimationFrame(() => this.animate());

                // ЭВОЛЮЦИЯ ДОРОЖЕК (Фикс бага некорректного добавления)
                if (this.score > 150 && this.laneCount < 4) { this.laneCount = 4; this.updateLaneDividers(); }
                if (this.score > 600 && this.laneCount < 5) { this.laneCount = 5; this.updateLaneDividers(); }
                if (this.score > 1200 && this.laneCount < 6) { this.laneCount = 6; this.updateLaneDividers(); }

                const frameSpeed = this.isSkating ? this.speed * 1.25 : this.speed;
                this.score += frameSpeed;
                this.speed += 0.00015;

                document.getElementById('scoreTxt').innerText = Math.floor(this.score).toString().padStart(6, '0');

                // Плавное движение и наклон
                const targetX = (this.targetLane - (this.laneCount - 1) / 2) * CONFIG.LANE_WIDTH;
                this.player.position.x += (targetX - this.player.position.x) * CONFIG.SMOOTH_FACTOR;
                this.player.rotation.z = (this.player.position.x - targetX) * 0.5;
                this.player.rotation.y += 0.03;

                // FOV эффект
                const targetFOV = this.isSkating ? 88 : 75;
                this.camera.fov += (targetFOV - this.camera.fov) * 0.1;
                this.camera.updateProjectionMatrix();

                // Штраф скейта
                if (this.isCrashed) {
                    const remaining = Math.ceil((this.cooldownEnd - Date.now()) / 1000);
                    if (remaining > 0) {
                        document.getElementById('timer-box').innerText = remaining + "S";
                    } else {
                        this.isCrashed = false;
                        document.getElementById('timer-box').innerText = "";
                        document.getElementById('skateBtn').style.opacity = "1";
                    }
                }

                // Логика объектов
                if (Math.random() < 0.03 + (this.score / 50000)) this.spawnObstacle();

                for (let i = this.obstacles.length - 1; i >= 0; i--) {
                    const o = this.obstacles[i];
                    o.position.z += frameSpeed * 3;

                    // Точная коллизия
                    if (this.player.position.distanceTo(o.position) < 1.1) {
                        if (this.isSkating) {
                            this.handleImpact();
                            this.scene.remove(o);
                            this.obstacles.splice(i, 1);
                        } else {
                            this.gameOver();
                        }
                    }

                    if (o.position.z > 20) { this.scene.remove(o); this.obstacles.splice(i, 1); }
                }

                // Движение города и линий
                this.buildings.forEach(b => {
                    b.position.z += frameSpeed * 1.5;
                    if (b.position.z > 25) b.position.z = -130;
                });
                this.laneDividers.forEach(line => {
                    line.position.z += frameSpeed * 5;
                    if (line.position.z > 50) line.position.z = -50;
                });

                this.renderer.render(this.scene, this.camera);
            },

            handleImpact() {
                this.isSkating = false;
                this.isCrashed = true;
                this.crashCount++;
                this.cooldownEnd = Date.now() + (this.crashCount * 5000);
                document.getElementById('skateBtn').classList.remove('active');
                document.getElementById('skateBtn').style.opacity = "0.2";
            },

            gameOver() {
                this.isRunning = false;
                Cabinet.save(this.score);
                document.getElementById('deathScreen').style.display = 'flex';
                document.getElementById('finalScore').innerText = Math.floor(this.score);
            }
        };

        // Initialize Cabinet
        window.onload = () => Cabinet.load();
    </script>
</body>
</html>
