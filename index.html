<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ANSA_RETAIL // ALMATY_2027</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;800&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080808;
            --accent: #ff2d55;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }

        /* Шапка и Локация */
        header { padding: 50px 20px 10px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; }
        .logo span { color: var(--accent); }

        /* Селектор Магазинов (ТРЦ Алматы) */
        .mall-selector {
            display: flex; gap: 10px; overflow-x: auto; padding: 10px 20px 20px;
            scrollbar-width: none; -ms-overflow-style: none;
        }
        .mall-selector::-webkit-scrollbar { display: none; }
        .mall-btn {
            background: var(--glass); border: 1px solid var(--border);
            padding: 10px 20px; border-radius: 15px; white-space: nowrap;
            font-size: 0.8rem; font-weight: bold; transition: 0.3s;
        }
        .mall-btn.active { background: var(--accent); border-color: var(--accent); }

        /* Поиск и Подсказки */
        .search-box { padding: 0 20px; position: relative; z-index: 100; }
        .input-wrap {
            background: #151515; border: 1px solid var(--border);
            border-radius: 20px; padding: 18px 20px; display: flex; align-items: center;
        }
        input { background: transparent; border: none; color: #fff; width: 100%; outline: none; font-size: 1rem; }
        
        .suggestions {
            position: absolute; top: 105%; left: 20px; right: 20px;
            background: #151515; border: 1px solid var(--border);
            border-radius: 15px; display: none; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .suggest-item { padding: 15px 20px; border-bottom: 1px solid var(--border); font-size: 0.9rem; cursor: pointer; }
        .suggest-item:last-child { border-none; }

        /* Сетка товаров */
        #feed { padding: 20px; display: grid; grid-template-columns: 1fr; gap: 25px; }
        .card {
            background: var(--glass); border-radius: 30px; padding: 15px;
            border: 1px solid var(--border); animation: fadeInUp 0.5s ease;
        }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .img-holder { width: 100%; height: 450px; border-radius: 22px; overflow: hidden; background: #111; position: relative; }
        .img-holder img { width: 100%; height: 100%; object-fit: cover; }
        .mall-tag { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.7); padding: 5px 12px; border-radius: 10px; font-size: 0.6rem; color: var(--accent); font-weight: 800; }

        .info { padding: 15px 5px; }
        .name { font-size: 1.4rem; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; }
        .price { font-size: 1.1rem; color: #fff; font-weight: 300; }
    </style>
</head>
<body>

<header>
    <div class="logo">ANSA<span>_</span>RETAIL</div>
    <div style="font-size: 0.6rem; opacity: 0.5;">ALMATY // 2026</div>
</header>

<div class="mall-selector" id="mallTabs">
    <div class="mall-btn active" onclick="filterMall('ALL')">ВСЕ ТРЦ</div>
    <div class="mall-btn" onclick="filterMall('MEGA')">MEGA CENTER</div>
    <div class="mall-btn" onclick="filterMall('DOSTYK')">DOSTYK PLAZA</div>
    <div class="mall-btn" onclick="filterMall('ESENTAI')">ESENTAI MALL</div>
</div>

<div class="search-box">
    <div class="input-wrap">
        <input type="text" id="mainSearch" placeholder="Начни писать: Anta, Nike..." autocomplete="off">
    </div>
    <div class="suggestions" id="suggestBox"></div>
</div>

<main id="feed"></main>

<script>
    // База Брендов для подсказок
    const BRANDS = ["Anta", "Adidas", "Asics", "Jordan", "Li-Ning", "New Balance", "Nike", "Puma", "Reebok", "Yeezy"];
    
    // База Кроссовок (Контент для Алматы)
    const KICKS_DATA = [
        { brand: "Anta", model: "Shock The Game", price: 58000, mall: "MEGA", tags: ["an", "ant", "anta"] },
        { brand: "Anta", model: "KT9 Light", price: 72000, mall: "DOSTYK", tags: ["an", "ant", "anta"] },
        { brand: "Nike", model: "Air Jordan 1 Retro", price: 125000, mall: "ESENTAI", tags: ["ni", "nik", "nike", "jo"] },
        { brand: "Nike", model: "Dunk Low Panda", price: 85000, mall: "MEGA", tags: ["ni", "nik", "nike"] },
        { brand: "Adidas", model: "Yeezy Boost 350", price: 195000, mall: "DOSTYK", tags: ["ad", "adi", "yee"] },
        { brand: "Li-Ning", model: "Way of Wade 10", price: 110000, mall: "MEGA", tags: ["li", "lin"] }
    ];

    const input = document.getElementById('mainSearch');
    const suggestBox = document.getElementById('suggestBox');
    const feed = document.getElementById('feed');
    let currentMall = 'ALL';

    // Функция форматирования Тенге
    const formatKZT = (n) => new Intl.NumberFormat('ru-RU').format(n) + ' ₸';

    // 1. Система подсказок (Autocomplete)
    input.addEventListener('input', (e) => {
        const val = e.target.value.toLowerCase();
        suggestBox.innerHTML = '';
        
        if (val.length > 0) {
            const matches = BRANDS.filter(b => b.toLowerCase().startsWith(val));
            if (matches.length > 0) {
                suggestBox.style.display = 'block';
                matches.forEach(m => {
                    const div = document.createElement('div');
                    div.className = 'suggest-item';
                    div.innerText = m;
                    div.onclick = () => {
                        input.value = m;
                        suggestBox.style.display = 'none';
                        renderFeed(m);
                    };
                    suggestBox.appendChild(div);
                });
            } else { suggestBox.style.display = 'none'; }
        } else { suggestBox.style.display = 'none'; }
    });

    // 2. Фильтр по ТРЦ
    function filterMall(mall) {
        currentMall = mall;
        document.querySelectorAll('.mall-btn').forEach(btn => {
            btn.classList.toggle('active', btn.innerText.includes(mall) || (mall === 'ALL' && btn.innerText === 'ВСЕ ТРЦ'));
        });
        renderFeed(input.value);
    }

    // 3. Отрисовка ленты
    function renderFeed(query = "") {
        feed.innerHTML = '';
        const search = query.toLowerCase();
        
        const filtered = KICKS_DATA.filter(k => {
            const mallMatch = (currentMall === 'ALL' || k.mall === currentMall);
            const brandMatch = k.brand.toLowerCase().includes(search) || k.model.toLowerCase().includes(search) || k.tags.some(t => t === search);
            return mallMatch && brandMatch;
        });

        filtered.forEach((k, i) => {
            const card = document.createElement('div');
            card.className = 'card';
            const imgUrl = `https://loremflickr.com/800/1000/sneakers,${k.brand.toLowerCase()}/all?lock=${i + Math.random()}`;
            
            card.innerHTML = `
                <div class="img-holder">
                    <div class="mall-tag">${k.mall} CENTER</div>
                    <img src="${imgUrl}" alt="kicks">
                </div>
                <div class="info">
                    <div class="name">${k.brand} ${k.model}</div>
                    <div class="price">${formatKZT(k.price)}</div>
                </div>
            `;
            feed.appendChild(card);
        });
        
        if (filtered.length === 0) {
            feed.innerHTML = `<p style="text-align:center; opacity:0.3; padding:40px;">Ничего не найдено в этом ТРЦ...</p>`;
        }
    }

    // Закрытие подсказок при клике вне
    document.addEventListener('click', (e) => {
        if (!e.target.closest('.search-box')) suggestBox.style.display = 'none';
    });

    // Стартовая отрисовка
    renderFeed();
</script>

</body>
</html>
