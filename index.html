<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ANSA_RUN // PROTOCOL_EVOLUTION</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Plus+Jakarta+Sans:wght@300;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #ff2d55;
            --blue: #007aff;
            --bg: #030303;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { background: var(--bg); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; touch-action: none; }

        /* UI Layers */
        .ui-screen {
            position: fixed; inset: 0; z-index: 1000;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px);
            text-align: center; transition: 0.5s;
        }

        .hud {
            position: fixed; top: 0; left: 0; width: 100%; padding: 50px 25px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100; pointer-events: none;
        }

        .btn-main {
            background: none; border: 1px solid var(--accent); color: var(--accent);
            padding: 15px 50px; font-family: 'Orbitron'; letter-spacing: 3px;
            text-transform: uppercase; margin-top: 20px; cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 45, 85, 0.2);
        }

        /* Pause Button */
        .pause-trigger {
            position: fixed; top: 50px; right: 25px; width: 45px; height: 45px;
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; display: flex; justify-content: center;
            align-items: center; z-index: 500; pointer-events: all;
        }

        /* Skate Button */
        .skate-wrap {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            z-index: 100; pointer-events: all;
        }
        .skate-btn {
            width: 85px; height: 85px; background: var(--glass);
            border: 2px solid rgba(255,255,255,0.1); border-radius: 50%;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; backdrop-filter: blur(10px);
        }
        .skate-btn.active { border-color: var(--accent); background: rgba(255,45,85,0.2); box-shadow: 0 0 30px var(--accent); }

        canvas { display: block; filter: contrast(1.1); }
        
        .level-up-toast {
            position: fixed; top: 150px; left: 50%; transform: translateX(-50%);
            color: var(--blue); font-family: 'Orbitron'; font-size: 0.8rem;
            letter-spacing: 5px; opacity: 0; transition: 0.5s;
        }
    </style>
</head>
<body>

    <div id="menuScreen" class="ui-screen">
        <h1 style="font-family:'Orbitron'; font-size: 2.5rem; margin-bottom: 5px;">ANSA<span style="color:var(--accent)">_</span>RUN</h1>
        <p style="font-size: 0.6rem; letter-spacing: 5px; color: #444; margin-bottom: 40px;">ALMATY_PROTOCOL_2027</p>
        <div style="font-size: 0.8rem; color: #888;">BEST_SCORE: <span id="bestVal" style="color:#fff">0</span></div>
        <button class="btn-main" onclick="startGame()">START_SYSTEM</button>
    </div>

    <div id="pauseScreen" class="ui-screen" style="display: none; background: rgba(0,0,0,0.7);">
        <h2 style="font-family:'Orbitron'; color:var(--blue); letter-spacing: 10px;">PAUSED</h2>
        <button class="btn-main" style="border-color:var(--blue); color:var(--blue);" onclick="resumeGame()">RESUME</button>
    </div>

    <div id="deathScreen" class="ui-screen" style="display: none;">
        <h2 style="font-family:'Orbitron'; color:var(--accent);">CRITICAL_FAILURE</h2>
        <div style="margin: 30px 0;">
            <p class="label" style="font-size: 0.6rem; color:#444;">DISTANCE_REACHED</p>
            <p id="finalScore" style="font-size: 2rem; font-family:'Orbitron';">0</p>
        </div>
        <button class="btn-main" onclick="location.reload()">REBOOT</button>
    </div>

    <div class="hud">
        <div style="border-left: 2px solid var(--accent); padding-left: 15px;">
            <p style="font-size: 9px; color:#555; letter-spacing: 2px;">SCORE</p>
            <p id="scoreDisplay" style="font-family:'Orbitron'; font-size: 20px; color:var(--accent);">000000</p>
        </div>
        <div id="levelToast" class="level-up-toast">PROTOCOL_EXPANDED</div>
    </div>

    <div class="pause-trigger" onclick="pauseGame()">⏸</div>

    <div class="skate-wrap">
        <div id="skateBtn" class="skate-btn">
            <span style="font-size: 20px;">🛹</span>
            <span id="cooldownVal" style="font-size: 10px; font-weight: bold; color:var(--accent);"></span>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        /**
         * ANSA_RUN v.3.0 // DYNAMIC ARCHITECTURE
         */
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- СОСТОЯНИЕ ---
        let gameActive = false;
        let isPaused = false;
        let score = 0;
        let highScore = localStorage.getItem('ansa_best_v3') || 0;
        document.getElementById('bestVal').innerText = Math.floor(highScore);

        let laneCount = 3; // Динамическое количество дорожек
        let speed = 6;
        let isSkating = false;
        let isCrashed = false;
        let crashCount = 0;
        let cooldownEnd = 0;
        let obstacles = [];
        let particles = [];
        let lastSpawn = 0;

        const player = {
            lane: 1,
            x: window.innerWidth / 2,
            targetX: window.innerWidth / 2,
            y: window.innerHeight - 180,
            size: 40
        };

        // --- УПРАВЛЕНИЕ (Улучшенное для телефона) ---
        window.addEventListener('touchstart', (e) => {
            if (!gameActive || isPaused) return;
            const touchX = e.touches[0].clientX;
            const laneWidth = window.innerWidth / laneCount;
            
            // Нахождение дорожки по месту тапа
            player.lane = Math.floor(touchX / laneWidth);
            player.targetX = (player.lane * laneWidth) + (laneWidth / 2);
        });

        document.getElementById('skateBtn').addEventListener('touchstart', (e) => {
            e.stopPropagation();
            if (isCrashed || !gameActive || isPaused) return;
            isSkating = !isSkating;
            document.getElementById('skateBtn').classList.toggle('active', isSkating);
        });

        function startGame() {
            document.getElementById('menuScreen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('menuScreen').style.display = 'none';
                gameActive = true;
                update();
            }, 500);
        }

        function pauseGame() {
            if (!gameActive) return;
            isPaused = true;
            document.getElementById('pauseScreen').style.display = 'flex';
        }

        function resumeGame() {
            isPaused = false;
            document.getElementById('pauseScreen').style.display = 'none';
            update();
        }

        // --- ДВИЖОК СЛОЖНОСТИ (Evolution System) ---
        function handleDifficulty() {
            // 100 очков -> 4 дорожки
            if (score > 100 && laneCount < 4) upgradeLanes(4);
            // 500 очков -> 5 дорожек
            if (score > 500 && laneCount < 5) upgradeLanes(5);
            // 1000 очков -> 6 дорожек
            if (score > 1000 && laneCount < 6) upgradeLanes(6);
        }

        function upgradeLanes(newCount) {
            laneCount = newCount;
            const toast = document.getElementById('levelToast');
            toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 2000);
            
            // Пересчет позиции игрока под новые дорожки
            const laneWidth = window.innerWidth / laneCount;
            player.targetX = (player.lane * laneWidth) + (laneWidth / 2);
        }

        // --- ГЛАВНЫЙ ЦИКЛ ---
        function update() {
            if (!gameActive || isPaused) return;

            handleDifficulty();

            const currentSpeed = isSkating ? speed * 1.25 : speed; // Скорость x1.25
            score += currentSpeed / 15;
            speed += 0.0008;

            document.getElementById('scoreDisplay').innerText = Math.floor(score).toString().padStart(6, '0');

            // Штраф за скейт
            if (isCrashed) {
                const remaining = Math.ceil((cooldownEnd - Date.now()) / 1000);
                if (remaining > 0) {
                    document.getElementById('cooldownVal').innerText = remaining + 'S';
                } else {
                    isCrashed = false;
                    document.getElementById('cooldownVal').innerText = '';
                }
            }

            // Спавн препятствий (зависит от очков)
            const spawnRate = Math.max(400, 1000 - (score / 2));
            if (Date.now() - lastSpawn > spawnRate) {
                const count = score > 500 ? 2 : 1; // Больше коробок на высоких очках
                for(let i=0; i<count; i++) {
                    obstacles.push({
                        lane: Math.floor(Math.random() * laneCount),
                        y: -100,
                        speed: currentSpeed
                    });
                }
                lastSpawn = Date.now();
            }

            // Движение игрока
            player.x += (player.targetX - player.x) * 0.15;

            // Логика объектов
            const laneWidth = window.innerWidth / laneCount;
            for (let i = obstacles.length - 1; i >= 0; i--) {
                const o = obstacles[i];
                o.y += currentSpeed;
                const ox = (o.lane * laneWidth) + (laneWidth / 2);

                // Коллизия
                if (Math.abs(player.x - ox) < 40 && Math.abs(player.y - o.y) < 50) {
                    if (isSkating) {
                        triggerCrash();
                        obstacles.splice(i, 1);
                    } else {
                        gameOver();
                    }
                }
                if (o.y > window.innerHeight + 100) obstacles.splice(i, 1);
            }

            draw();
            requestAnimationFrame(update);
        }

        function triggerCrash() {
            isSkating = false;
            isCrashed = true;
            crashCount++;
            cooldownEnd = Date.now() + (crashCount * 5000); // 5, 10, 15... секунд
            document.getElementById('skateBtn').classList.remove('active');
            // Эффект тряски
            canvas.style.transform = 'translateX(10px)';
            setTimeout(() => canvas.style.transform = 'translateX(0)', 100);
        }

        function gameOver() {
            gameActive = false;
            document.getElementById('deathScreen').style.display = 'flex';
            document.getElementById('finalScore').innerText = Math.floor(score);
            if (score > highScore) localStorage.setItem('ansa_best_v3', score);
        }

        function draw() {
            ctx.fillStyle = '#030303';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Отрисовка дорожек
            const laneWidth = window.innerWidth / laneCount;
            ctx.strokeStyle = 'rgba(255,255,255,0.05)';
            for(let i=1; i<laneCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * laneWidth, 0);
                ctx.lineTo(i * laneWidth, canvas.height);
                ctx.stroke();
            }

            // Препятствия (Sci-Fi кубы)
            obstacles.forEach(o => {
                const ox = (o.lane * laneWidth) + (laneWidth / 2);
                ctx.strokeStyle = '#ff2d55';
                ctx.lineWidth = 2;
                ctx.strokeRect(ox - 25, o.y - 25, 50, 50);
                ctx.fillStyle = 'rgba(255, 45, 85, 0.1)';
                ctx.fillRect(ox - 25, o.y - 25, 50, 50);
            });

            // Игрок
            ctx.save();
            ctx.translate(player.x, player.y);
            
            if (isSkating) {
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#ff2d55';
                ctx.fillStyle = '#ff2d55';
                ctx.fillRect(-25, 25, 50, 5);
            }

            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.roundRect(-15, -20, 30, 45, 8);
            ctx.fill();
            ctx.restore();
        }
    </script>
</body>
</html>
