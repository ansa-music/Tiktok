<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ANSA_RUN_3D // PROTOCOL_2027</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #ff2d55; --blue: #007aff; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; overflow: hidden; font-family: sans-serif; touch-action: none; }
        
        /* UI HUD */
        .hud {
            position: fixed; top: 0; left: 0; width: 100%; padding: 50px 25px;
            display: flex; justify-content: space-between; z-index: 100; pointer-events: none;
        }
        .score-box { border-left: 3px solid var(--accent); padding-left: 15px; font-family: 'Orbitron', sans-serif; }
        .score-val { font-size: 24px; color: var(--accent); text-shadow: 0 0 15px var(--accent); }

        /* Controls */
        .skate-wrap { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 100; }
        .skate-btn {
            width: 80px; height: 80px; background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1); border-radius: 50%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            backdrop-filter: blur(15px); transition: 0.3s;
        }
        .skate-btn.active { border-color: var(--accent); background: rgba(255,45,85,0.3); box-shadow: 0 0 30px var(--accent); }
        .skate-btn.disabled { opacity: 0.2; }

        /* Screens */
        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; text-align: center; backdrop-filter: blur(20px);
        }
        .btn-action {
            background: none; border: 1px solid var(--accent); color: var(--accent);
            padding: 15px 50px; font-family: 'Orbitron'; margin-top: 30px; letter-spacing: 3px;
        }
        
        #pauseBtn { position: fixed; top: 50px; right: 25px; font-size: 20px; z-index: 500; cursor: pointer; }
    </style>
</head>
<body>

    <div id="startScreen" class="overlay">
        <h1 style="font-family:'Orbitron'; font-size: 2rem; color: #fff;">ANSA<span style="color:var(--accent)">_</span>3D</h1>
        <p style="font-size: 10px; letter-spacing: 5px; color: #444; margin-bottom: 30px;">ALMATY_ENGINE_V3</p>
        <button class="btn-action" onclick="initGame()">INIT_SYSTEM</button>
    </div>

    <div class="hud">
        <div class="score-box">
            <div style="font-size: 9px; color: #555; letter-spacing: 2px;">NEURAL_SCORE</div>
            <div id="score" class="score-val">000000</div>
        </div>
    </div>

    <div id="pauseBtn" onclick="togglePause()">⏸</div>

    <div class="skate-wrap">
        <div id="skateBtn" class="skate-btn">
            <span style="font-size: 20px;">🛹</span>
            <span id="timer" style="font-size: 10px; font-weight: bold; color: var(--accent);"></span>
        </div>
    </div>

    <div id="deathScreen" class="overlay" style="display:none;">
        <h2 style="font-family:'Orbitron'; color:var(--accent);">CRASH_DETECTED</h2>
        <button class="btn-action" onclick="location.reload()">REBOOT</button>
    </div>

    <script>
        /**
         * ANSA_RUN_3D // CORE ENGINE
         * Three.js, Физика, Динамические дорожки
         */
        
        let scene, camera, renderer, player, floor;
        let obstacles = [];
        let isRunning = false;
        let isPaused = false;
        let score = 0;
        let speed = 0.4;
        let laneCount = 3;
        let currentLane = 1;
        let isSkating = false;
        let isCrashed = false;
        let crashCount = 0;
        let cooldownEnd = 0;

        const LANE_WIDTH = 2; // Ширина дорожки в 3D единицах

        function initGame() {
            document.getElementById('startScreen').style.display = 'none';
            
            // 1. Создание Сцены
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x000000, 10, 35);
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // 2. Освещение (Neon Style)
            const light = new THREE.PointLight(0xff2d55, 2, 50);
            light.position.set(0, 5, 5);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040));

            // 3. Пол (Бесконечная сетка)
            const floorGeo = new THREE.PlaneGeometry(20, 100);
            const floorMat = new THREE.MeshPhongMaterial({ 
                color: 0x050505, 
                emissive: 0x111111,
                side: THREE.DoubleSide 
            });
            floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // Сетка на полу
            const grid = new THREE.GridHelper(100, 50, 0xff2d55, 0x222222);
            grid.rotation.x = 0;
            scene.add(grid);

            // 4. Игрок (3D Глайдер)
            const playerGeo = new THREE.IcosahedronGeometry(0.4, 0);
            const playerMat = new THREE.MeshPhongMaterial({ color: 0xffffff, wireframe: true });
            player = new THREE.Mesh(playerGeo, playerMat);
            player.position.y = 0.5;
            player.position.z = 5;
            scene.add(player);

            camera.position.set(0, 3, 10);
            camera.lookAt(player.position);

            isRunning = true;
            animate();
        }

        // Управление под большой палец
        window.addEventListener('touchstart', (e) => {
            if (!isRunning || isPaused) return;
            const touchX = e.touches[0].clientX;
            const screenPart = window.innerWidth / laneCount;
            currentLane = Math.floor(touchX / screenPart);
        });

        document.getElementById('skateBtn').addEventListener('touchstart', (e) => {
            e.stopPropagation();
            if (isCrashed) return;
            isSkating = !isSkating;
            document.getElementById('skateBtn').classList.toggle('active', isSkating);
        });

        function spawnObstacle() {
            const geo = new THREE.BoxGeometry(0.8, 0.8, 0.8);
            const mat = new THREE.MeshPhongMaterial({ color: 0xff2d55, emissive: 0xff2d55 });
            const box = new THREE.Mesh(geo, mat);
            
            const lane = Math.floor(Math.random() * laneCount);
            const xPos = (lane - (laneCount - 1) / 2) * LANE_WIDTH;
            
            box.position.set(xPos, 0.4, -40);
            scene.add(box);
            obstacles.push(box);
        }

        function togglePause() {
            isPaused = !isPaused;
            document.getElementById('pauseBtn').innerText = isPaused ? "▶" : "⏸";
        }

        function animate() {
            if (!isRunning || isPaused) {
                requestAnimationFrame(animate);
                return;
            }

            // Динамическая сложность (Расширение дорожек)
            if (score > 100 && laneCount < 4) laneCount = 4;
            if (score > 500 && laneCount < 5) laneCount = 5;
            if (score > 1000 && laneCount < 6) laneCount = 6;

            const currentSpeed = isSkating ? speed * 1.25 : speed; // Скорость 1.25x
            score += currentSpeed;
            document.getElementById('score').innerText = Math.floor(score).toString().padStart(6, '0');

            // Эффект камеры при скорости
            const targetFOV = isSkating ? 85 : 75;
            camera.fov += (targetFOV - camera.fov) * 0.1;
            camera.updateProjectionMatrix();

            // Движение игрока
            const targetX = (currentLane - (laneCount - 1) / 2) * LANE_WIDTH;
            player.position.x += (targetX - player.position.x) * 0.15;
            player.rotation.y += 0.05;

            // Штраф скейта (5, 10, 15... сек)
            if (isCrashed) {
                const remaining = Math.ceil((cooldownEnd - Date.now()) / 1000);
                if (remaining > 0) {
                    document.getElementById('timer').innerText = remaining + "S";
                    document.getElementById('skateBtn').classList.add('disabled');
                    isSkating = false;
                } else {
                    isCrashed = false;
                    document.getElementById('timer').innerText = "";
                    document.getElementById('skateBtn').classList.remove('disabled');
                }
            }

            // Препятствия
            if (Math.random() < 0.03 + (score/50000)) spawnObstacle();

            for (let i = obstacles.length - 1; i >= 0; i--) {
                const o = obstacles[i];
                o.position.z += currentSpeed;

                // Коллизия в 3D
                const dist = player.position.distanceTo(o.position);
                if (dist < 0.8) {
                    if (isSkating) {
                        isCrashed = true;
                        crashCount++;
                        cooldownEnd = Date.now() + (crashCount * 5000);
                        scene.remove(o);
                        obstacles.splice(i, 1);
                        document.getElementById('skateBtn').classList.remove('active');
                    } else {
                        isRunning = false;
                        document.getElementById('deathScreen').style.display = 'flex';
                    }
                }

                if (o.position.z > 10) {
                    scene.remove(o);
                    obstacles.splice(i, 1);
                }
            }

            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
