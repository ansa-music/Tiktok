<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CISCO_CORE_V27</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="scanline"></div>
    
    <header>
        <div class="logo">ANSA_NETWORK</div>
        <div class="system-time" id="clock">00:00:00</div>
    </header>

    <main id="app">
        <div class="search-wrapper">
            <input type="text" id="searchInput" placeholder="Введите задачу (напр: DHCP, VLAN, OSPF)...">
        </div>

        <div id="content" class="fade-in">
            <div class="welcome-screen">
                <h2>ДОБРО ПОЖАЛОВАТЬ В БУДУЩЕЕ СЕТЕЙ</h2>
                <p>Выбери модуль ниже или воспользуйся поиском.</p>
                <div class="quick-nav">
                    <button onclick="loadModule('basics')">ОСНОВЫ</button>
                    <button onclick="loadModule('routing')">МАРШРУТИЗАЦИЯ</button>
                    <button onclick="loadModule('switching')">КОММУТАЦИЯ</button>
                </div>
            </div>
        </div>
    </main>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="loadModule('home')">HUB</div>
        <div class="nav-item" onclick="loadModule('lab')">LABS</div>
        <div class="nav-item" onclick="loadModule('terminal')">CLI</div>
    </nav>

    <script src="js/commands.js"></script>
    <script src="js/engine.js"></script>
</body>
</html>
