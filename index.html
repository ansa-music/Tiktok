<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ANSA_RUN_3D // ULTIMATE_V5</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@300;700&display=swap" rel="stylesheet">
    
    <style>
        /* ----------------------------------------------------------------------------
        UI/UX ARCHITECTURE (Mobile-First)
        ----------------------------------------------------------------------------
        */
        :root {
            --accent: #ff2d55;
            --blue: #007aff;
            --gold: #ffcc00;
            --bg: #010101;
            --glass: rgba(255, 255, 255, 0.02);
            --border: rgba(255, 255, 255, 0.07);
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            user-select: none;
            -webkit-touch-callout: none;
        }

        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'JetBrains Mono', monospace; 
            overflow: hidden; 
            touch-action: none;
        }

        /* HUD Layer */
        .hud-container {
            position: fixed; top: 0; left: 0; width: 100%;
            padding: calc(40px + env(safe-area-inset-top)) 25px 20px;
            display: flex; justify-content: space-between;
            z-index: 100; pointer-events: none;
        }

        .stats-panel { border-left: 2px solid var(--accent); padding-left: 15px; }
        .score-num { font-family: 'Orbitron', sans-serif; font-size: 32px; color: var(--accent); text-shadow: 0 0 25px var(--accent); }
        .label-micro { font-size: 8px; letter-spacing: 4px; color: #444; text-transform: uppercase; margin-bottom: 4px; }

        /* Cabinet & Modals */
        .screen-ui {
            position: fixed; inset: 0; background: rgba(0,0,0,0.98);
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 1000; text-align: center;
            backdrop-filter: blur(40px); transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .cabinet-interface {
            width: 88%; max-width: 450px; padding: 35px;
            background: var(--glass); border: 1px solid var(--border);
            border-radius: 40px; margin-bottom: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .btn-ansa {
            background: none; border: 1px solid var(--accent);
            color: var(--accent); padding: 22px 65px;
            font-family: 'Orbitron'; font-size: 0.7rem; letter-spacing: 6px;
            text-transform: uppercase; cursor: pointer; border-radius: 12px;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-ansa:active { background: var(--accent); color: #fff; transform: scale(0.92); }

        /* Mobile Controls */
        .control-dock {
            position: fixed; bottom: calc(45px + env(safe-area-inset-bottom));
            left: 50%; transform: translateX(-50%); z-index: 500;
        }

        .action-trigger {
            width: 100px; height: 100px; background: var(--glass);
            border: 2px solid var(--border); border-radius: 50%;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; backdrop-filter: blur(25px);
            transition: 0.4s;
        }
        .action-trigger.active { 
            border-color: var(--accent); 
            background: rgba(255, 45, 85, 0.2); 
            box-shadow: 0 0 50px var(--accent);
            transform: scale(1.1) translateY(-10px);
        }

        /* Language Switcher */
        .language-switcher {
            position: fixed; top: 120px; right: 25px; 
            display: flex; flex-direction: column; gap: 12px; z-index: 200;
        }
        .lang-btn {
            font-size: 10px; font-weight: 700; background: var(--glass); 
            border: 1px solid var(--border); padding: 6px 12px; 
            border-radius: 8px; color: #555; transition: 0.3s;
        }
        .lang-btn.active { color: var(--accent); border-color: var(--accent); background: rgba(255,45,85,0.1); }

        /* Achievement Toast */
        .toast {
            position: fixed; top: 180px; left: 50%; transform: translateX(-50%);
            padding: 10px 20px; background: var(--gold); color: #000;
            border-radius: 20px; font-weight: 900; font-size: 0.6rem;
            letter-spacing: 2px; opacity: 0; z-index: 1000; transition: 0.5s;
        }
    </style>
</head>
<body>

    <div id="achievementToast" class="toast">NEW_RECORD_UNLOCKED</div>

    <div class="hud-container">
        <div class="stats-panel">
            <div id="label-score" class="label-micro">SYNCING_DISTANCE</div>
            <div id="scoreDisplay" class="score-num">000000</div>
        </div>
        <div style="text-align: right;">
            <div id="label-status" class="label-micro">ENGINE: STABLE</div>
            <div id="speedDisplay" style="font-size: 13px; color: var(--blue); font-weight: 900; letter-spacing: 1px;">1.00X</div>
        </div>
    </div>

    <div id="startMenu" class="screen-ui">
        <div class="cabinet-interface">
            <h1 style="font-family:'Orbitron'; font-size: 2.5rem; margin-bottom: 5px;">ANSA<span style="color:var(--accent)">_</span>RUN</h1>
            <p style="font-size: 9px; letter-spacing: 7px; color: #555; margin-bottom: 35px;">ALMATY_PROTOCOL_V5.0</p>
            
            <div style="text-align: left; font-size: 11px; border-top: 1px solid var(--border); padding-top: 25px;">
                <div style="display:flex; justify-content:space-between; margin-bottom:12px;">
                    <span id="ui-best">Personal Best:</span> <span id="highScoreText" style="color:var(--accent); font-weight:bold;">0</span>
                </div>
                <div style="display:flex; justify-content:space-between; margin-bottom:12px;">
                    <span id="ui-total">Total Traveled:</span> <span id="totalDistText">0</span>
                </div>
                <div style="display:flex; justify-content:space-between;">
                    <span id="ui-sessions">Data Logs:</span> <span id="sessionCountText">0</span>
                </div>
            </div>
        </div>
        <button id="bootBtn" class="btn-ansa" onclick="EngineCore.boot()">Initialize System</button>
    </div>

    <div id="deathScreen" class="screen-ui" style="display: none;">
        <h2 style="font-family:'Orbitron'; color:var(--accent); font-size: 2.2rem; margin-bottom: 10px;">SYSTEM_CRASHED</h2>
        <div style="margin: 45px 0;">
            <div id="finalScoreDisplay" class="score-num" style="font-size: 4rem;">0</div>
            <p id="ui-saved" style="font-size: 11px; color: #444; margin-top: 15px; letter-spacing: 2px;">RESTORING_CABINET_DATA...</p>
        </div>
        <button id="rebootBtn" class="btn-ansa" onclick="location.reload()">Reboot Protocol</button>
    </div>

    <div class="control-dock">
        <div id="skateTrigger" class="action-trigger">
            <span id="cooldownText" style="position:absolute; top:-35px; font-weight:900; color:var(--accent); font-size:14px; font-family:'Orbitron';"></span>
            <span style="font-size: 36px;">🛹</span>
        </div>
    </div>

    <script>
        /**
         * =========================================================================
         * MODULE 01: GLOBAL CONFIGURATION & LOCALIZATION
         * =========================================================================
         */
        const CONFIG = {
            ACCENT: 0xff2d55,
            BLUE: 0x007aff,
            LANE_WIDTH: 2.8,
            BASE_SPEED: 0.38,
            GRAVITY: 0.05,
            SMOOTHING: 0.18
        };

        const Lang = {
            active: 'ru',
            data: {
                ru: { score: "Дистанция", status: "Система: Ок", boot: "Запуск", best: "Рекорд:", total: "Всего:", sessions: "Логи:", saved: "Данные в кабинете" },
                en: { score: "Distance", status: "Status: OK", boot: "Boot System", best: "Best Score:", total: "Total Dist:", sessions: "Logs:", saved: "Restoring data..." }
            },
            init() {
                const d = this.data[this.active];
                document.getElementById('label-score').innerText = d.score;
                document.getElementById('label-status').innerText = d.status;
                document.getElementById('bootBtn').innerText = d.boot;
                document.getElementById('ui-best').innerText = d.best;
                document.getElementById('ui-total').innerText = d.total;
                document.getElementById('ui-sessions').innerText = d.sessions;
                document.getElementById('ui-saved').innerText = d.saved;
            }
        };

        /**
         * =========================================================================
         * MODULE 02: PERSISTENCE LAYER (Cabinet)
         * =========================================================================
         */
        const Cabinet = {
            stats: { best: 0, total: 0, sessions: 0 },
            load() {
                this.stats.best = parseInt(localStorage.getItem('ansa_v5_best') || 0);
                this.stats.total = parseInt(localStorage.getItem('ansa_v5_total') || 0);
                this.stats.sessions = parseInt(localStorage.getItem('ansa_v5_sessions') || 0);
                
                document.getElementById('highScoreText').innerText = this.stats.best;
                document.getElementById('totalDistText').innerText = this.stats.total;
                document.getElementById('sessionCountText').innerText = this.stats.sessions;
            },
            save(sessionScore) {
                if (sessionScore > this.stats.best) localStorage.setItem('ansa_v5_best', Math.floor(sessionScore));
                localStorage.setItem('ansa_v5_total', this.stats.total + Math.floor(sessionScore));
                localStorage.setItem('ansa_v5_sessions', this.stats.sessions + 1);
            }
        };

        /**
         * =========================================================================
         * MODULE 03: ENGINE CORE (Three.js Implementation)
         * =========================================================================
         */
        const EngineCore = {
            scene: null, camera: null, renderer: null,
            player: null, obstacles: [], buildings: [],
            isRunning: false, score: 0, speed: CONFIG.BASE_SPEED, laneCount: 3,
            isSkating: false, isCrashed: false, crashCount: 0, cooldownEnd: 0,
            currentLane: 1, targetLane: 1,

            boot() {
                document.getElementById('startMenu').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('startMenu').style.display = 'none';
                    this.initGraphics();
                    this.setupListeners();
                    this.isRunning = true;
                    this.mainLoop();
                }, 600);
            },

            initGraphics() {
                this.scene = new THREE.Scene();
                this.scene.fog = new THREE.Fog(0x000000, 18, 48);
                
                this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                this.renderer = new THREE.WebGLRenderer({ antialias: true, stencil: false });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                document.body.appendChild(this.renderer.domElement);

                // Lighting Matrix
                const pLight = new THREE.PointLight(CONFIG.ACCENT, 4, 65);
                pLight.position.set(0, 12, 6);
                this.scene.add(pLight);
                this.scene.add(new THREE.AmbientLight(0x252525));

                // Ground & World Grid
                const gridHelper = new THREE.GridHelper(200, 80, CONFIG.ACCENT, 0x111111);
                gridHelper.position.y = 0.02;
                this.scene.add(gridHelper);

                // Procedural Architecture (Almaty Districts)
                for(let i=0; i<45; i++) this.createStructure(i * 12 - 120);

                this.spawnPlayer();
                this.camera.position.set(0, 4.2, 12.5);
                this.camera.lookAt(0, 0.5, 0);
            },

            spawnPlayer() {
                const glider = new THREE.Group();
                // Core Body
                const body = new THREE.Mesh(
                    new THREE.IcosahedronGeometry(0.55, 0),
                    new THREE.MeshPhongMaterial({ color: 0xffffff, wireframe: true })
                );
                glider.add(body);
                // Propulsion System
                const thrust = new THREE.Mesh(
                    new THREE.BoxGeometry(1.3, 0.12, 0.5),
                    new THREE.MeshBasicMaterial({ color: CONFIG.BLUE })
                );
                thrust.position.y = -0.25;
                glider.add(thrust);

                this.player = glider;
                this.player.position.set(0, 0.7, 5.5);
                this.scene.add(this.player);
            },

            createStructure(z) {
                const height = 6 + Math.random() * 22;
                const building = new THREE.Mesh(
                    new THREE.BoxGeometry(4.5, height, 4.5),
                    new THREE.MeshPhongMaterial({ color: 0x0a0a0a, wireframe: Math.random() > 0.4 })
                );
                building.position.set(Math.random() > 0.5 ? 18 : -18, height/2, z);
                this.scene.add(building);
                this.buildings.push(building);
            },

            setupListeners() {
                // Fixed Lane Logic
                window.addEventListener('touchstart', (e) => {
                    const partWidth = window.innerWidth / this.laneCount;
                    this.targetLane = Math.floor(e.touches[0].clientX / partWidth);
                });

                document.getElementById('skateTrigger').addEventListener('touchstart', (e) => {
                    if (!this.isCrashed) {
                        this.isSkating = !this.isSkating;
                        document.getElementById('skateTrigger').classList.toggle('active', this.isSkating);
                    }
                });
            },

            mainLoop() {
                if (!this.isRunning) return;
                requestAnimationFrame(() => this.mainLoop());

                // Adaptive Lane System (Evolution)
                if (this.score > 120 && this.laneCount < 4) this.evolveWorld(4);
                if (this.score > 600 && this.laneCount < 5) this.evolveWorld(5);

                const frameSpeed = this.isSkating ? this.speed * 1.25 : this.speed;
                this.score += frameSpeed;
                this.speed += 0.00012;

                // Update UI
                document.getElementById('scoreDisplay').innerText = Math.floor(this.score).toString().padStart(6, '0');
                document.getElementById('speedDisplay').innerText = frameSpeed.toFixed(2) + "X";

                // Movement Physics
                const targetX = (this.targetLane - (this.laneCount - 1) / 2) * CONFIG.LANE_WIDTH;
                if (!isNaN(targetX)) {
                    this.player.position.x += (targetX - this.player.position.x) * CONFIG.SMOOTHING;
                    this.player.rotation.z = (this.player.position.x - targetX) * 0.45;
                }
                this.player.rotation.y += 0.025;

                // Cooldown Management
                if (this.isCrashed) {
                    const remaining = Math.ceil((this.cooldownEnd - Date.now()) / 1000);
                    if (remaining > 0) {
                        document.getElementById('cooldownText').innerText = remaining + "S";
                    } else {
                        this.isCrashed = false;
                        document.getElementById('cooldownText').innerText = "";
                        document.getElementById('skateTrigger').style.opacity = "1";
                    }
                }

                // AI Director: Spawning
                if (Math.random() < 0.025 + (this.score/60000)) this.addObstacle();

                // Object Processing
                this.processObstacles(frameSpeed);
                this.processCity(frameSpeed);

                this.renderer.render(this.scene, this.camera);
            },

            addObstacle() {
                const lane = Math.floor(Math.random() * this.laneCount);
                const cube = new THREE.Mesh(
                    new THREE.BoxGeometry(1.1, 1.1, 1.1),
                    new THREE.MeshPhongMaterial({ color: CONFIG.ACCENT, emissive: CONFIG.ACCENT, emissiveIntensity: 0.6 })
                );
                cube.position.set((lane - (this.laneCount - 1) / 2) * CONFIG.LANE_WIDTH, 0.55, -55);
                this.scene.add(cube);
                this.obstacles.push(cube);
            },

            processObstacles(s) {
                for (let i = this.obstacles.length - 1; i >= 0; i--) {
                    const o = this.obstacles[i];
                    o.position.z += s * 2.8;
                    
                    // Collision Math
                    if (this.player.position.distanceTo(o.position) < 1.0) {
                        if (this.isSkating) {
                            this.handleImpact();
                            this.scene.remove(o);
                            this.obstacles.splice(i, 1);
                        } else {
                            this.triggerGameOver();
                        }
                    }
                    if (o.position.z > 20) { this.scene.remove(o); this.obstacles.splice(i, 1); }
                }
            },

            processCity(s) {
                this.buildings.forEach(b => {
                    b.position.z += s * 1.6;
                    if (b.position.z > 25) b.position.z = -120;
                });
            },

            evolveWorld(n) {
                this.laneCount = n;
                document.getElementById('achievementToast').style.opacity = '1';
                setTimeout(() => document.getElementById('achievementToast').style.opacity = '0', 2500);
            },

            handleImpact() {
                this.isSkating = false;
                this.isCrashed = true;
                this.crashCount++;
                this.cooldownEnd = Date.now() + (this.crashCount * 5000);
                document.getElementById('skateTrigger').classList.remove('active');
                document.getElementById('skateTrigger').style.opacity = "0.2";
            },

            triggerGameOver() {
                this.isRunning = false;
                Cabinet.save(this.score);
                document.getElementById('deathScreen').style.display = 'flex';
                document.getElementById('finalScoreDisplay').innerText = Math.floor(this.score);
            }
        };

        // Initialize
        window.onload = () => {
            Cabinet.load();
            Lang.init();
        };
    </script>
</body>
</html>
