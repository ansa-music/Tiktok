<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ANSA_RUN // TURBINE_V17</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #ff2d55;
            --blue: #00f2ff;
            --bg: #000;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body, html { width: 100%; height: 100%; background: var(--bg); color: #fff; font-family: 'JetBrains Mono', monospace; overflow: hidden; touch-action: none; }

        /* HUD: Top Status */
        .hud-v17 {
            position: fixed; top: 0; left: 0; width: 100%;
            padding: calc(45px + env(safe-area-inset-top)) 25px;
            display: flex; justify-content: space-between; z-index: 100; pointer-events: none;
        }

        .data-card { border-left: 4px solid var(--accent); padding: 10px 20px; background: rgba(0,0,0,0.6); backdrop-filter: blur(15px); border-radius: 0 15px 15px 0; }
        .score-val { font-family: 'Orbitron', sans-serif; font-size: 30px; color: var(--accent); text-shadow: 0 0 20px var(--accent); }
        .tag { font-size: 8px; letter-spacing: 5px; color: #555; text-transform: uppercase; }

        /* HUD: Bottom Controls */
        .ctrl-v17 {
            position: fixed; bottom: calc(35px + env(safe-area-inset-bottom));
            left: 0; width: 100%; display: flex; flex-direction: column;
            align-items: center; z-index: 200; pointer-events: none;
        }

        .boost-track {
            width: 220px; height: 4px; background: rgba(255,255,255,0.05);
            border-radius: 2px; overflow: hidden; margin-bottom: 20px;
        }
        .boost-fill { width: 0%; height: 100%; background: var(--blue); box-shadow: 0 0 15px var(--blue); transition: 0.3s; }

        .turbine-btn {
            width: 90px; height: 90px; background: var(--glass);
            border: 2px solid var(--border); border-radius: 50%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            backdrop-filter: blur(25px); pointer-events: all; transition: 0.4s;
        }
        .turbine-btn.active { border-color: var(--blue); background: rgba(0, 242, 255, 0.2); box-shadow: 0 0 50px var(--blue); transform: scale(1.1); }
        
        #cdLabel { position: absolute; top: -30px; font-weight: 900; color: var(--accent); font-family: 'Orbitron'; font-size: 14px; }

        /* Screens */
        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.98);
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 1000; text-align: center;
            backdrop-filter: blur(40px); transition: 0.8s;
        }

        .btn-start {
            background: none; border: 1px solid var(--accent);
            color: var(--accent); padding: 22px 70px;
            font-family: 'Orbitron'; font-size: 0.75rem; letter-spacing: 7px;
            text-transform: uppercase; cursor: pointer; border-radius: 14px;
        }

        canvas { display: block; }
    </style>
</head>
<body>

    <div class="hud-v17">
        <div class="data-card">
            <div class="tag">SYNC_DISTANCE</div>
            <div id="scoreTxt" class="score-val">000000</div>
        </div>
        <div style="text-align: right; background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 15px 0 0 15px;">
            <div class="tag">ALMATY_V17_STABLE</div>
            <div id="laneStatus" style="font-size: 10px; color: var(--blue); font-weight: 900;">ACTIVE_LANE: 1</div>
        </div>
    </div>

    <div id="menuScreen" class="overlay">
        <h1 style="font-family:'Orbitron'; font-size: 2.5rem; margin-bottom: 5px;">ANSA<span style="color:var(--accent)">_</span>RUN</h1>
        <p style="font-size: 9px; letter-spacing: 12px; color: #333; margin-bottom: 50px;">TURBINE_PROTOCOL_2027</p>
        <button class="btn-start" onclick="Engine.init()">Boot System</button>
    </div>

    <div id="deathScreen" class="overlay" style="display: none;">
        <h2 style="font-family:'Orbitron'; color:var(--accent); font-size: 2rem;">CONNECTION_LOST</h2>
        <div id="finalScore" class="score-val" style="font-size: 4.5rem; margin: 30px 0;">0</div>
        <button class="btn-start" onclick="location.reload()">Reboot Protocol</button>
    </div>

    <div class="ctrl-v17">
        <div class="boost-track"><div id="boostFill" class="boost-fill"></div></div>
        <div id="skateBtn" class="turbine-btn">
            <div id="cdLabel"></div>
            <span style="font-size: 36px;">🚀</span>
            <div style="font-size: 7px; font-weight: 900; color: #555; margin-top: 5px;">TURBINE</div>
        </div>
    </div>

    <canvas id="stage"></canvas>

    <script>
        /**
         * =========================================================================
         * MODULE: TURBINE_ENGINE_V17 // FIXED_LANE_PRECISION
         * =========================================================================
         */

        const Engine = {
            scene: null, camera: null, renderer: null,
            player: null, stars: null,
            lanes: [], obstacles: [], buildings: [],
            
            isRunning: false, score: 0,
            speed: 0.35, baseSpeed: 0.35,
            
            laneCount: 3, currentLane: 1, 
            laneWidth: 5.5,

            isSkating: false, isCrashed: false, cooldownEnd: 0,
            CONST_CD: 4000, 

            init() {
                document.getElementById('menuScreen').style.display = 'none';
                this.setupCore();
                this.createWorld();
                this.setupInput();
                this.isRunning = true;
                this.animate();
            },

            setupCore() {
                this.scene = new THREE.Scene();
                this.scene.fog = new THREE.Fog(0x000000, 40, 180);
                
                this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                this.renderer = new THREE.WebGLRenderer({ 
                    canvas: document.getElementById('stage'), 
                    antialias: true 
                });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

                const l1 = new THREE.PointLight(0x00f2ff, 10, 150);
                l1.position.set(0, 20, 20);
                this.scene.add(l1);
                this.scene.add(new THREE.AmbientLight(0xffffff, 0.2));
            },

            createWorld() {
                this.createStars();
                this.createCleanTrack(); // ФИКС ПОЛА: Четкие полосы
                this.createTitanShip(); 
                
                for(let i=0; i<60; i++) this.spawnTitanBldg(i * 15 - 150);

                this.camera.position.set(0, 8, 22);
                this.camera.lookAt(0, 2, 0);
            },

            createStars() {
                const geo = new THREE.BufferGeometry();
                const count = 4000;
                const pos = new Float32Array(count * 3);
                for(let i=0; i < count * 3; i++) pos[i] = (Math.random() - 0.5) * 1000;
                geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
                this.stars = new THREE.Points(geo, new THREE.PointsMaterial({ size: 1, color: 0xffffff, transparent: true, opacity: 0.6 }));
                this.scene.add(this.stars);
            },

            /**
             * ЧИСТАЯ ТРАССА: Каждая полоса - отдельный блок
             */
            createCleanTrack() {
                this.lanes.forEach(l => this.scene.remove(l));
                this.lanes = [];

                const road = new THREE.Mesh(
                    new THREE.PlaneGeometry(60, 600),
                    new THREE.MeshStandardMaterial({ color: 0x020202, metalness: 1, roughness: 0.1 })
                );
                road.rotation.x = -Math.PI / 2;
                this.scene.add(road);

                for(let i = 0; i < this.laneCount; i++) {
                    const xPos = (i - (this.laneCount - 1) / 2) * this.laneWidth;
                    
                    // Блок полосы
                    const laneGeo = new THREE.PlaneGeometry(this.laneWidth - 0.2, 600);
                    const laneMat = new THREE.MeshBasicMaterial({ 
                        color: 0x00f2ff, transparent: true, opacity: 0.05 
                    });
                    const l = new THREE.Mesh(laneGeo, laneMat);
                    l.rotation.x = -Math.PI / 2;
                    l.position.set(xPos, 0.02, 0);
                    this.scene.add(l);
                    this.lanes.push(l);

                    // Лазерные границы
                    const border = new THREE.Mesh(new THREE.PlaneGeometry(0.15, 600), new THREE.MeshBasicMaterial({ color: 0x333333 }));
                    border.rotation.x = -Math.PI / 2;
                    border.position.set(xPos - this.laneWidth/2, 0.05, 0);
                    this.scene.add(border);
                    
                    if(i === this.laneCount - 1) {
                         const lastBorder = border.clone();
                         lastBorder.position.x = xPos + this.laneWidth/2;
                         this.scene.add(lastBorder);
                    }
                }
            },

            createTitanShip() {
                const ship = new THREE.Group();
                const body = new THREE.Mesh(new THREE.IcosahedronGeometry(0.7, 0), new THREE.MeshStandardMaterial({ color: 0xffffff, metalness: 1, roughness: 0.1 }));
                body.scale.set(1.2, 0.6, 2.8);
                ship.add(body);

                const wings = new THREE.Mesh(new THREE.BoxGeometry(4.5, 0.1, 1.2), new THREE.MeshStandardMaterial({ color: 0xff2d55, emissive: 0xff2d55, emissiveIntensity: 2 }));
                wings.position.set(0, -0.2, 0.8);
                ship.add(wings);

                // Турбины
                const eng = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 1.0), new THREE.MeshPhongMaterial({ color: 0x222222 }));
                eng.rotation.x = Math.PI/2; eng.position.set(0.9, -0.3, 1.2);
                ship.add(eng);
                
                const eng2 = eng.clone(); eng2.position.x = -0.9;
                ship.add(eng2);

                this.player = ship;
                this.player.position.set(0, 1.5, 12);
                this.scene.add(this.player);
            },

            setupInput() {
                window.addEventListener('touchstart', (e) => {
                    if (!this.isRunning) return;
                    const touchX = e.touches[0].clientX;
                    if (touchX < window.innerWidth / 2) {
                        if (this.currentLane > 0) this.currentLane--;
                    } else {
                        if (this.currentLane < this.laneCount - 1) this.currentLane++;
                    }
                    this.updateLaneFX(); // Обновляем подсветку полос
                });

                document.getElementById('skateBtn').addEventListener('touchstart', (e) => {
                    e.stopPropagation();
                    if (this.isCrashed) return;
                    this.isSkating = !this.isSkating;
                    document.getElementById('skateBtn').classList.toggle('active', this.isSkating);
                });
            },

            /**
             * ПОДСВЕТКА АКТИВНОЙ ПОЛОСЫ: Чтобы не путаться
             */
            updateLaneFX() {
                this.lanes.forEach((l, i) => {
                    l.material.opacity = (i === this.currentLane) ? 0.25 : 0.05;
                    l.material.color.setHex((i === this.currentLane) ? 0x00f2ff : 0x005577);
                });
                document.getElementById('laneStatus').innerText = `ACTIVE_LANE: ${this.currentLane + 1}`;
            },

            animate() {
                if (!this.isRunning) return;
                requestAnimationFrame(() => this.animate());

                // Эволюция трассы
                if (this.score > 300 && this.laneCount < 4) { this.laneCount = 4; this.createCleanTrack(); }
                if (this.score > 1000 && this.laneCount < 5) { this.laneCount = 5; this.createCleanTrack(); }

                const frameSpeed = this.isSkating ? this.speed * 1.3 : this.speed;
                this.score += frameSpeed;
                this.speed += 0.0001;

                document.getElementById('scoreTxt').innerText = Math.floor(this.score).toString().padStart(6, '0');

                // Плавное движение
                const targetX = (this.currentLane - (this.laneCount - 1) / 2) * this.laneWidth;
                this.player.position.x += (targetX - this.player.position.x) * 0.16;
                this.player.rotation.z = (this.player.position.x - targetX) * 0.4;

                // Кулдаун
                if (this.isCrashed) {
                    const rem = Math.ceil((this.cooldownEnd - Date.now()) / 1000);
                    if (rem > 0) {
                        document.getElementById('cdLabel').innerText = rem + "S";
                        document.getElementById('boostFill').style.width = '0%';
                    } else {
                        this.isCrashed = false;
                        document.getElementById('cdLabel').innerText = "";
                        document.getElementById('skateBtn').classList.remove('cooldown');
                    }
                } else {
                    document.getElementById('boostFill').style.width = this.isSkating ? '100%' : '50%';
                }

                // УМНЫЙ СПАВН: Гарантированный проход
                if (Math.random() < 0.03 + (this.score / 60000)) this.spawnSafeObstacle();

                for (let i = this.obstacles.length - 1; i >= 0; i--) {
                    const o = this.obstacles[i];
                    o.position.z += frameSpeed * 4.5;

                    if (this.player.position.distanceTo(o.position) < 1.6) {
                        if (this.isSkating) {
                            this.handleImpact();
                            this.scene.remove(o);
                            this.obstacles.splice(i, 1);
                        } else {
                            this.gameOver();
                        }
                    }
                    if (o.position.z > 30) { this.scene.remove(o); this.obstacles.splice(i, 1); }
                }

                this.buildings.forEach(b => {
                    b.position.z += frameSpeed * 2.5;
                    if (b.position.z > 50) b.position.z = -200;
                });

                this.renderer.render(this.scene, this.camera);
            },

            /**
             * АЛГОРИТМ ГАРАНТИРОВАННОГО ПРОХОДА: Исправляет баг "стен из коробок"
             */
            spawnSafeObstacle() {
                // Если объектов слишком много на одной линии Z, пропускаем
                const recent = this.obstacles.filter(o => o.position.z < -170);
                if (recent.length >= this.laneCount - 1) return; 

                const lane = Math.floor(Math.random() * this.laneCount);
                // Проверяем, не занята ли эта линия уже на этом Z
                if (recent.some(o => o.laneIndex === lane)) return;

                const cube = new THREE.Mesh(
                    new THREE.BoxGeometry(1.8, 1.8, 1.8),
                    new THREE.MeshStandardMaterial({ color: 0xff2d55, emissive: 0xff2d55, emissiveIntensity: 2.5 })
                );
                const xPos = (lane - (this.laneCount - 1) / 2) * this.laneWidth;
                cube.position.set(xPos, 1.0, -200);
                cube.laneIndex = lane; // Запоминаем дорожку
                this.scene.add(cube);
                this.obstacles.push(cube);
            },

            spawnTitanBldg(z) {
                const h = 20 + Math.random() * 50;
                const b = new THREE.Mesh(new THREE.BoxGeometry(8, h, 8), new THREE.MeshStandardMaterial({ color: 0x050505, metalness: 1 }));
                b.position.set(Math.random() > 0.5 ? 45 : -45, h/2, z);
                this.scene.add(b);
                this.buildings.push(b);
            },

            handleImpact() {
                this.isSkating = false; this.isCrashed = true;
                this.cooldownEnd = Date.now() + this.CONST_CD;
                document.getElementById('skateBtn').classList.remove('active');
                document.getElementById('skateBtn').classList.add('cooldown');
            },

            gameOver() {
                this.isRunning = false;
                document.getElementById('deathScreen').style.display = 'flex';
                document.getElementById('finalScore').innerText = Math.floor(this.score);
            }
        };
    </script>
</body>
</html>
