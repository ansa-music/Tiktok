<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ANSA_RUN // NEON_OVERDRIVE</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #ff2d55;
            --blue: #00f2ff;
            --bg: #000000;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body, html { width: 100%; height: 100%; background: var(--bg); color: #fff; font-family: 'JetBrains Mono', monospace; overflow: hidden; touch-action: none; }

        /* --- HUD SYSTEM (Inspired by Photo) --- */
        .hud-top {
            position: fixed; top: 0; left: 0; width: 100%;
            padding: calc(40px + env(safe-area-inset-top)) 25px;
            display: flex; justify-content: space-between; z-index: 100; pointer-events: none;
        }

        .hud-bottom {
            position: fixed; bottom: calc(20px + env(safe-area-inset-bottom));
            left: 0; width: 100%; display: flex; flex-direction: column;
            align-items: center; z-index: 200; pointer-events: none;
        }

        .score-box { font-family: 'Orbitron', sans-serif; font-size: 34px; color: var(--accent); text-shadow: 0 0 25px var(--accent); }
        .label-tech { font-size: 8px; letter-spacing: 4px; color: #444; text-transform: uppercase; }

        /* Boost Bar (Bottom) */
        .boost-container {
            width: 250px; height: 12px; background: rgba(255,255,255,0.05);
            border-radius: 10px; border: 1px solid var(--border);
            overflow: hidden; margin-bottom: 20px; position: relative;
        }
        .boost-fill {
            width: 0%; height: 100%; background: linear-gradient(90deg, var(--accent), #ff8ea1);
            box-shadow: 0 0 15px var(--accent); transition: width 0.3s;
        }
        .boost-label { position: absolute; width: 100%; text-align: center; top: -15px; font-size: 8px; font-weight: bold; color: #fff; letter-spacing: 2px; }

        /* Buttons */
        .skate-trigger {
            width: 90px; height: 90px; background: var(--glass);
            border: 2px solid var(--border); border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            backdrop-filter: blur(20px); pointer-events: all; transition: 0.3s;
        }
        .skate-trigger.active { border-color: var(--blue); background: rgba(0, 242, 255, 0.2); box-shadow: 0 0 40px var(--blue); }
        .skate-trigger.cooldown { opacity: 0.2; transform: scale(0.8); }

        /* Modals */
        .ui-screen {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 1000; text-align: center;
            backdrop-filter: blur(40px); transition: 0.5s;
        }

        .btn-ansa {
            background: none; border: 1px solid var(--accent);
            color: var(--accent); padding: 22px 60px;
            font-family: 'Orbitron'; font-size: 0.8rem; letter-spacing: 5px;
            text-transform: uppercase; cursor: pointer; border-radius: 12px;
        }

        canvas { display: block; filter: contrast(1.1) saturate(1.2); }
    </style>
</head>
<body>

    <div class="hud-top">
        <div>
            <div class="label-tech">Sync_Distance</div>
            <div id="scoreTxt" class="score-box">000000</div>
        </div>
        <div style="text-align: right;">
            <div class="label-tech">Status: Stable</div>
            <div id="laneTxt" style="font-size: 11px; color: var(--blue); font-weight: 900;">LANES: 3 / SPEED: 1.0</div>
        </div>
    </div>

    <div class="hud-bottom">
        <div class="boost-container">
            <div class="boost-label">BOOST_READY</div>
            <div id="boostFill" class="boost-fill"></div>
        </div>
        <div id="skateBtn" class="skate-trigger">
            <span style="font-size: 36px;">🛹</span>
        </div>
    </div>

    <div id="menuScreen" class="ui-screen">
        <h1 style="font-family:'Orbitron'; font-size: 2.5rem; margin-bottom: 5px;">ANSA<span style="color:var(--accent)">_</span>OVERDRIVE</h1>
        <p style="font-size: 8px; letter-spacing: 8px; color: #444; margin-bottom: 40px;">ALMATY_RETAIL_OS_2027</p>
        <button class="btn-ansa" onclick="OverdriveEngine.init()">Initialize Core</button>
    </div>

    <div id="deathScreen" class="ui-screen" style="display: none;">
        <h2 style="font-family:'Orbitron'; color:var(--accent); font-size: 2.5rem;">CRITICAL_FAILURE</h2>
        <div id="finalScore" class="score-box" style="font-size: 4rem; margin: 30px 0;">0</div>
        <button class="btn-ansa" onclick="location.reload()">Reboot Protocol</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        /**
         * =========================================================================
         * MODULE: NEON_OVERDRIVE_CORE (Enterprise Architecture)
         * =========================================================================
         */

        const OverdriveEngine = {
            scene: null, camera: null, renderer: null,
            player: null, floor: null, lanes: [], obstacles: [], buildings: [],
            
            isRunning: false, isPaused: false, score: 0,
            speed: 0.4, baseSpeed: 0.4, maxSpeed: 1.2,
            
            laneCount: 3, currentLane: 1, targetLane: 1,
            laneWidth: 4.5, // Увеличенная ширина дорожек

            isSkating: false, isCrashed: false, crashCount: 0, cooldownEnd: 0,

            init() {
                document.getElementById('menuScreen').style.display = 'none';
                this.setupGraphics();
                this.setupWorld();
                this.setupControls();
                this.isRunning = true;
                this.animate();
            },

            setupGraphics() {
                this.scene = new THREE.Scene();
                this.scene.fog = new THREE.Fog(0x000000, 25, 75);
                
                this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                this.renderer = new THREE.WebGLRenderer({ 
                    canvas: document.getElementById('gameCanvas'), 
                    antialias: true 
                });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

                const pLight = new THREE.PointLight(0x00f2ff, 8, 100);
                pLight.position.set(0, 15, 15);
                this.scene.add(pLight);
                this.scene.add(new THREE.AmbientLight(0x111111));
            },

            setupWorld() {
                this.createHyperFloor(); // ФИКС ПОЛУ: Теперь как на фото
                this.createShip(); // ФИКС ПЕРСОНАЖА: Теперь это корабль
                
                for(let i=0; i<60; i++) this.spawnDecor(i * 15 - 150);

                // Идеальный угол камеры из референса
                this.camera.position.set(0, 7, 18);
                this.camera.lookAt(0, 2, 0);
            },

            /**
             * ХАЙПЕР-ПОЛ: Широкие дорожки с неоновой подсветкой
             */
            createHyperFloor() {
                this.lanes.forEach(l => this.scene.remove(l));
                this.lanes = [];

                // Генерируем широкие дорожки
                for(let i = 0; i < this.laneCount; i++) {
                    const geo = new THREE.PlaneGeometry(this.laneWidth - 0.5, 300);
                    const mat = new THREE.MeshPhongMaterial({ 
                        color: 0x050505, 
                        emissive: (i === this.currentLane) ? 0x002233 : 0x080808,
                        side: THREE.DoubleSide,
                        transparent: true,
                        opacity: 0.9
                    });
                    const lane = new THREE.Mesh(geo, mat);
                    lane.rotation.x = -Math.PI / 2;
                    const xPos = (i - (this.laneCount - 1) / 2) * this.laneWidth;
                    lane.position.set(xPos, 0, 0);
                    this.scene.add(lane);
                    this.lanes.push(lane);

                    // Боковые неоновые полосы
                    const edgeGeo = new THREE.PlaneGeometry(0.15, 300);
                    const edgeMat = new THREE.MeshBasicMaterial({ color: 0x00f2ff });
                    const leftEdge = new THREE.Mesh(edgeGeo, edgeMat);
                    leftEdge.rotation.x = -Math.PI / 2;
                    leftEdge.position.set(xPos - (this.laneWidth/2 - 0.2), 0.05, 0);
                    this.scene.add(leftEdge);
                    
                    const rightEdge = leftEdge.clone();
                    rightEdge.position.x = xPos + (this.laneWidth/2 - 0.2);
                    this.scene.add(rightEdge);
                }
                
                // Сетка поверх всего
                const grid = new THREE.GridHelper(300, 60, 0x111111, 0x050505);
                grid.position.y = 0.01;
                this.scene.add(grid);
            },

            createShip() {
                // Детализированный Interceptor V.13
                const group = new THREE.Group();
                
                const body = new THREE.Mesh(new THREE.ConeGeometry(0.6, 2.0, 4), new THREE.MeshPhongMaterial({ color: 0xffffff, wireframe: true }));
                body.rotation.x = Math.PI / 2;
                group.add(body);

                const wingGeo = new THREE.BoxGeometry(2.8, 0.1, 0.9);
                const wingMat = new THREE.MeshBasicMaterial({ color: 0xff2d55 });
                const wings = new THREE.Mesh(wingGeo, wingMat);
                wings.position.set(0, -0.2, 0.4);
                group.add(wings);

                // Двигатели
                const engGeo = new THREE.CylinderGeometry(0.25, 0.25, 0.7);
                const engMat = new THREE.MeshPhongMaterial({ color: 0x222222 });
                const e1 = new THREE.Mesh(engGeo, engMat);
                e1.rotation.x = Math.PI/2; e1.position.set(0.6, -0.3, 0.8);
                group.add(e1);
                
                const e2 = e1.clone(); e2.position.x = -0.6;
                group.add(e2);

                this.player = group;
                this.player.position.set(0, 1.3, 8);
                this.scene.add(this.player);
            },

            setupControls() {
                window.addEventListener('touchstart', (e) => {
                    if (!this.isRunning) return;
                    const touchX = e.touches[0].clientX;
                    if (touchX < window.innerWidth / 2) {
                        if (this.currentLane > 0) this.currentLane--;
                    } else {
                        if (this.currentLane < this.laneCount - 1) this.currentLane++;
                    }
                    this.updateLaneVisuals();
                });

                document.getElementById('skateBtn').addEventListener('touchstart', (e) => {
                    e.stopPropagation();
                    if (this.isCrashed) return;
                    this.isSkating = !this.isSkating;
                    document.getElementById('skateBtn').classList.toggle('active', this.isSkating);
                });
            },

            updateLaneVisuals() {
                this.lanes.forEach((l, i) => {
                    l.material.emissive.setHex(i === this.currentLane ? 0x002233 : 0x080808);
                });
            },

            animate() {
                if (!this.isRunning) return;
                requestAnimationFrame(() => this.animate());

                // Эволюция по референсу
                if (this.score > 300 && this.laneCount < 4) { this.laneCount = 4; this.createHyperFloor(); }
                if (this.score > 1000 && this.laneCount < 5) { this.laneCount = 5; this.createHyperFloor(); }

                const frameSpeed = this.isSkating ? this.speed * 1.25 : this.speed;
                this.score += frameSpeed;
                this.speed += 0.0001;

                document.getElementById('scoreTxt').innerText = Math.floor(this.score).toString().padStart(6, '0');
                document.getElementById('laneTxt').innerText = `LANES: ${this.laneCount} / SPEED: ${frameSpeed.toFixed(1)}`;

                // Плавное движение и наклон
                const targetX = (this.currentLane - (this.laneCount - 1) / 2) * this.laneWidth;
                this.player.position.x += (targetX - this.player.position.x) * 0.16;
                this.player.rotation.z = (this.player.position.x - targetX) * 0.4;

                // FOV эффект
                const targetFOV = this.isSkating ? 90 : 75;
                this.camera.fov += (targetFOV - this.camera.fov) * 0.1;
                this.camera.updateProjectionMatrix();

                // Шкала Boost
                if (this.isCrashed) {
                    const rem = Math.ceil((this.cooldownEnd - Date.now()) / 1000);
                    document.getElementById('boostFill').style.width = '0%';
                } else {
                    document.getElementById('boostFill').style.width = this.isSkating ? '100%' : '50%';
                }

                // Спавн и коллизия
                if (Math.random() < 0.03 + (this.score / 50000)) this.spawnObstacle();

                for (let i = this.obstacles.length - 1; i >= 0; i--) {
                    const o = this.obstacles[i];
                    o.position.z += frameSpeed * 4;
                    if (this.player.position.distanceTo(o.position) < 1.4) {
                        if (this.isSkating) {
                            this.handleImpact();
                            this.scene.remove(o);
                            this.obstacles.splice(i, 1);
                        } else {
                            this.gameOver();
                        }
                    }
                    if (o.position.z > 25) { this.scene.remove(o); this.obstacles.splice(i, 1); }
                }

                this.buildings.forEach(b => {
                    b.position.z += frameSpeed * 2.5;
                    if (b.position.z > 30) b.position.z = -150;
                });

                this.renderer.render(this.scene, this.camera);
            },

            spawnObstacle() {
                const lane = Math.floor(Math.random() * this.laneCount);
                const cube = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.5, 1.5), new THREE.MeshPhongMaterial({ color: 0xff2d55, emissive: 0xff2d55, emissiveIntensity: 1 }));
                const xPos = (lane - (this.laneCount - 1) / 2) * this.laneWidth;
                cube.position.set(xPos, 0.75, -80);
                this.scene.add(cube);
                this.obstacles.push(cube);
            },

            spawnDecor(z) {
                const h = 10 + Math.random() * 30;
                const b = new THREE.Mesh(new THREE.BoxGeometry(6, h, 6), new THREE.MeshPhongMaterial({ color: 0x080808, wireframe: true }));
                b.position.set(Math.random() > 0.5 ? 30 : -30, h/2, z);
                this.scene.add(b);
                this.buildings.push(b);
            },

            handleImpact() {
                this.isSkating = false; this.isCrashed = true; this.crashCount++;
                this.cooldownEnd = Date.now() + (this.crashCount * 5000);
                document.getElementById('skateBtn').classList.remove('active');
            },

            gameOver() {
                this.isRunning = false;
                document.getElementById('deathScreen').style.display = 'flex';
                document.getElementById('finalScore').innerText = Math.floor(this.score);
            }
        };
    </script>
</body>
</html>
