<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ANSA_RUN_2027</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #ff2d55; --bg: #050505; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; overflow: hidden; touch-action: none; }
        
        canvas { display: block; }

        /* Интерфейс поверх игры */
        .ui { position: fixed; top: 0; left: 0; width: 100%; padding: 40px 20px; pointer-events: none; }
        .score { font-family: 'Orbitron', sans-serif; font-size: 20px; color: var(--accent); }
        .highscore { font-size: 12px; opacity: 0.5; }

        /* Кнопка активации скейта (удобно под палец) */
        .skate-btn {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            width: 80px; height: 80px; background: rgba(255,255,255,0.05);
            border: 2px solid var(--accent); border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 24px; z-index: 100; transition: 0.2s;
        }
        .skate-btn.active { background: var(--accent); box-shadow: 0 0 30px var(--accent); }
        .skate-btn.cooldown { opacity: 0.2; border-color: #333; }

        #cooldown-timer { position: absolute; top: -30px; font-size: 12px; color: var(--accent); font-weight: bold; }

        .game-over {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 200;
        }
    </style>
</head>
<body>

    <div class="ui">
        <div class="score" id="scoreDisplay">SCORE: 0</div>
        <div class="highscore" id="bestDisplay">BEST: 0</div>
    </div>

    <div class="skate-btn" id="skateBtn">
        <span id="cooldown-timer"></span>
        🛹
    </div>

    <div class="game-over" id="gameOverScreen">
        <h1 style="font-family:'Orbitron'; color:var(--accent); margin-bottom:20px;">SYSTEM_CRASHED</h1>
        <p id="finalScore" style="margin-bottom:40px;"></p>
        <button onclick="location.reload()" style="background:var(--accent); border:none; color:#fff; padding:15px 40px; border-radius:10px; font-weight:bold;">REBOOT_SYSTEM</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const skateBtn = document.getElementById('skateBtn');
        const cooldownTxt = document.getElementById('cooldown-timer');

        // Настройки экрана
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Состояние
        let score = 0;
        let highScore = localStorage.getItem('ansa_best') || 0;
        document.getElementById('bestDisplay').innerText = `BEST: ${Math.floor(highScore)}`;

        let speed = 5;
        let isSkating = false;
        let crashCount = 0;
        let cooldownEnd = 0;
        let isGameOver = false;

        // Персонаж
        const player = {
            lane: 1, // 0, 1, 2
            x: canvas.width / 2,
            targetX: canvas.width / 2,
            y: canvas.height - 150
        };

        const obstacles = [];

        // Управление тапами
        window.addEventListener('touchstart', (e) => {
            if (isGameOver) return;
            const touchX = e.touches[0].clientX;
            if (touchX < canvas.width / 2) {
                if (player.lane > 0) player.lane--;
            } else {
                if (player.lane < 2) player.lane++;
            }
            player.targetX = (canvas.width / 4) * (player.lane + 1);
        });

        // Кнопка скейта
        skateBtn.addEventListener('touchstart', (e) => {
            e.stopPropagation();
            if (Date.now() < cooldownEnd) return;
            isSkating = !isSkating;
            skateBtn.classList.toggle('active', isSkating);
        });

        function spawnObstacle() {
            const lane = Math.floor(Math.random() * 3);
            obstacles.push({
                x: (canvas.width / 4) * (lane + 1),
                y: -100
            });
        }

        setInterval(spawnObstacle, 1000);

        function update() {
            if (isGameOver) return;

            // Логика кулдауна
            if (Date.now() < cooldownEnd) {
                isSkating = false;
                skateBtn.classList.add('cooldown');
                skateBtn.classList.remove('active');
                cooldownTxt.innerText = Math.ceil((cooldownEnd - Date.now()) / 1000) + "s";
            } else {
                skateBtn.classList.remove('cooldown');
                cooldownTxt.innerText = "";
            }

            let currentSpeed = isSkating ? speed * 1.25 : speed;
            score += currentSpeed / 60;
            speed += 0.001;

            document.getElementById('scoreDisplay').innerText = `SCORE: ${Math.floor(score)}`;

            // Плавное движение игрока
            player.x += (player.targetX - player.x) * 0.2;

            // Движение препятствий
            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].y += currentSpeed;

                // Коллизия
                if (Math.abs(player.x - obstacles[i].x) < 40 && Math.abs(player.y - obstacles[i].y) < 40) {
                    if (isSkating) {
                        isSkating = false;
                        crashCount++;
                        cooldownEnd = Date.now() + (crashCount * 5000);
                        obstacles.splice(i, 1);
                    } else {
                        endGame();
                    }
                }

                if (obstacles[i] && obstacles[i].y > canvas.height) obstacles.splice(i, 1);
            }

            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Дороги
            ctx.strokeStyle = '#111';
            for (let i = 1; i <= 3; i++) {
                ctx.beginPath();
                ctx.moveTo((canvas.width / 4) * i, 0);
                ctx.lineTo((canvas.width / 4) * i, canvas.height);
                ctx.stroke();
            }

            // Препятствия (кубы)
            ctx.fillStyle = '#ff2d55';
            obstacles.forEach(o => {
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#ff2d55';
                ctx.fillRect(o.x - 20, o.y - 20, 40, 40);
                ctx.shadowBlur = 0;
            });

            // Игрок
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(player.x, player.y, 20, 0, Math.PI * 2);
            ctx.fill();

            if (isSkating) {
                ctx.strokeStyle = '#ff2d55';
                ctx.lineWidth = 4;
                ctx.strokeRect(player.x - 25, player.y + 25, 50, 10);
            }
        }

        function endGame() {
            isGameOver = true;
            document.getElementById('gameOverScreen').style.display = 'flex';
            document.getElementById('finalScore').innerText = `FINAL_SCORE: ${Math.floor(score)}`;
            if (score > highScore) {
                localStorage.setItem('ansa_best', score);
            }
        }

        update();
    </script>
</body>
</html>
