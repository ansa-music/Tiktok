<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ANSA // ALMATY_RETAIL_27</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;800&family=Orbitron:wght@900&display=swap" rel="stylesheet">

    <style>
        body { background-color: #050505; color: white; font-family: 'Plus Jakarta Sans', sans-serif; }
        .font-cyber { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-tab { background: #ff2d55; box-shadow: 0 0 20px rgba(255, 45, 85, 0.4); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- БАЗА ДАННЫХ (Инфраструктура Алматы) ---
        const SNEAKERS_DB = [
            { id: 1, brand: "Anta", model: "Shock The Game 6.0", price: 62000, mall: "Mega Center", tags: ["an", "anta", "ан", "анта"], img: "sneakers,anta" },
            { id: 2, brand: "Anta", model: "KT9 Gold", price: 78000, mall: "Dostyk Plaza", tags: ["an", "anta"], img: "anta,shoes" },
            { id: 3, brand: "Nike", model: "Jordan 1 Retro High", price: 145000, mall: "Esentai Mall", tags: ["ni", "nike", "найк", "jo"], img: "jordan,1" },
            { id: 4, brand: "Nike", model: "Dunk Low Panda", price: 89000, mall: "Mega Center", tags: ["ni", "nike"], img: "nike,dunk" },
            { id: 5, brand: "Li-Ning", model: "Way of Wade 10", price: 115000, mall: "Mega Center", tags: ["li", "lining", "ли"], img: "lining,shoes" },
            { id: 6, brand: "Adidas", model: "Yeezy Boost 350", price: 210000, mall: "Dostyk Plaza", tags: ["ad", "adi", "yee"], img: "yeezy,350" },
            { id: 7, brand: "New Balance", model: "2002R Protection", price: 135000, mall: "Esentai Mall", tags: ["ne", "new"], img: "newbalance" }
        ];

        const MALLS = ["ВСЕ", "Mega Center", "Dostyk Plaza", "Esentai Mall"];

        function App() {
            const [query, setQuery] = useState("");
            const [selectedMall, setSelectedMall] = useState("ВСЕ");
            const [results, setResults] = useState(SNEAKERS_DB);
            const [isScanning, setIsScanning] = useState(false);
            const [showSuggest, setShowSuggest] = useState(false);

            // Настройка Fuse.js (ИИ-поиск)
            const fuse = useMemo(() => new Fuse(SNEAKERS_DB, {
                keys: ['brand', 'model', 'tags', 'mall'],
                threshold: 0.3
            }), []);

            // Логика фильтрации
            useEffect(() => {
                setIsScanning(true);
                const timer = setTimeout(() => {
                    let filtered = SNEAKERS_DB;
                    if (query.length > 0) {
                        const searchResults = fuse.search(query);
                        filtered = searchResults.map(r => r.item);
                    }
                    if (selectedMall !== "ВСЕ") {
                        filtered = filtered.filter(item => item.mall === selectedMall);
                    }
                    setResults(filtered);
                    setIsScanning(false);
                }, 400);
                return () => clearTimeout(timer);
            }, [query, selectedMall]);

            const formatKZT = (n) => new Intl.NumberFormat('ru-RU').format(n) + ' ₸';

            return (
                <div className="min-h-screen pb-24">
                    {/* Header */}
                    <header className="p-6 pt-12 flex justify-between items-center">
                        <div>
                            <h1 className="font-cyber text-xl tracking-tighter">ANSA<span className="text-[#ff2d55]">_</span>RETAIL</h1>
                            <p className="text-[10px] text-gray-500 tracking-widest uppercase">Almaty Engine v2.0</p>
                        </div>
                        <div className="text-right text-[10px] text-gray-400">
                            SYSTEM: ONLINE<br/>LOC: 43.2220° N
                        </div>
                    </header>

                    {/* Mall Selector */}
                    <div className="flex gap-3 overflow-x-auto px-6 no-scrollbar mb-6">
                        {MALLS.map(mall => (
                            <button 
                                key={mall}
                                onClick={() => setSelectedMall(mall)}
                                className={`px-5 py-3 rounded-2xl text-xs font-bold transition-all whitespace-nowrap border border-white/5 ${selectedMall === mall ? 'active-tab border-none' : 'glass'}`}
                            >
                                {mall.toUpperCase()}
                            </button>
                        ))}
                    </div>

                    {/* AI Search Box */}
                    <div className="px-6 relative mb-8">
                        <div className="glass rounded-3xl p-5 flex items-center gap-4 focus-within:border-[#ff2d55] transition-all">
                            <span className="text-[#ff2d55]">⚡</span>
                            <input 
                                type="text"
                                value={query}
                                onChange={(e) => {setQuery(e.target.value); setShowSuggest(true);}}
                                placeholder="Бренд или модель (Anta, Nike...)"
                                className="bg-transparent border-none outline-none w-full text-white placeholder-gray-600"
                            />
                        </div>
                        
                        {/* Autocomplete Suggestions */}
                        {showSuggest && query.length > 0 && query.length < 4 && (
                            <div className="absolute top-full left-6 right-6 mt-2 glass rounded-2xl overflow-hidden z-50">
                                {["Anta", "Adidas", "Nike", "New Balance"].filter(b => b.toLowerCase().startsWith(query.toLowerCase())).map(brand => (
                                    <div 
                                        key={brand}
                                        onClick={() => {setQuery(brand); setShowSuggest(false);}}
                                        className="p-4 border-b border-white/5 active:bg-white/10 text-sm"
                                    >
                                        Найти <span className="text-[#ff2d55] font-bold">{brand}</span> в Алматы
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    {/* Feed */}
                    <div className="px-6 grid grid-cols-1 gap-8">
                        {isScanning ? (
                            <div className="text-center py-20 animate-pulse text-xs tracking-[5px] text-[#ff2d55]">
                                NEURAL_SCANNING...
                            </div>
                        ) : results.length > 0 ? (
                            results.map((item, idx) => (
                                <div key={item.id} className="glass rounded-[40px] p-4 group">
                                    <div className="relative w-full h-[450px] rounded-[30px] overflow-hidden bg-black">
                                        <div className="absolute top-4 left-4 z-10 glass px-3 py-1.5 rounded-xl text-[10px] font-black text-[#ff2d55]">
                                            {item.mall.toUpperCase()}
                                        </div>
                                        <img 
                                            src={`https://loremflickr.com/800/1200/sneakers,lifestyle,${item.brand.toLowerCase()}/all?lock=${item.id + 10}`} 
                                            className="w-full h-full object-cover opacity-80 group-hover:scale-110 transition-transform duration-1000"
                                            alt={item.model}
                                        />
                                        <div className="absolute bottom-0 left-0 w-full p-8 bg-gradient-to-t from-black to-transparent">
                                            <h3 className="text-2xl font-black uppercase leading-none mb-2">{item.brand} {item.model}</h3>
                                            <div className="flex justify-between items-center">
                                                <span className="text-gray-400 text-xs">STOCK_READY</span>
                                                <span className="text-xl font-light">{formatKZT(item.price)}</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            ))
                        ) : (
                            <div className="text-center py-20 text-gray-600 text-sm">
                                В {selectedMall} ничего не найдено...
                            </div>
                        )}
                    </div>

                    {/* Nav Bar */}
                    <nav className="fixed bottom-8 left-6 right-6 h-20 glass rounded-[35px] flex justify-around items-center z-50">
                        <div className="text-xl text-[#ff2d55]">◈</div>
                        <div className="text-xl opacity-20">◉</div>
                        <div className="text-xl opacity-20">◎</div>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
